<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Přihlášení</title>
    <link rel="icon" type="image/png" href="kocourIco.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/745426684c.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="login.js"></script>
</head>
<body>
<button id="hamburger" class="hamburger-btn"><i class="fa-solid fa-bars"></i></button>
<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><i class="fa-solid fa-terminal"></i> <span>Menu</span></div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Úvod</a>
            <a href="tabulka.html" class="nav-link"><i class="fa-solid fa-table"></i> Slovník Pojmů</a>
            <a href="galerie.html" class="nav-link"><i class="fa-solid fa-brush"></i> Galarie</a>
            <a href="ukoly.html" class="nav-link"><i class="fa-solid fa-book"></i> Úkoly</a>
            <a href="projekty.html" class="nav-link"><i class="fa-solid fa-bed"></i> Projekty</a>
        </nav>
    </aside>
    <main class="main-content">
<header>
    <h1>Vyber typ přihlášení</h1>
    <p>Máš na výběr ze dvou možností, ani jedna nemá žádnou výhodu.</p>
</header>
        <div id="auth-section">
            <h2>Přihlášení / Registrace</h2>
            <input type="email" id="email" placeholder="Váš e-mail" required>
            <input type="password" id="password" placeholder="Vaše heslo" required>
            <br><br>
            <button id="login-btn">Přihlásit se</button>
            <button id="signup-btn">Zaregistrovat se</button>
            <p id="auth-message" style="color: red;"></p>
        </div>

        <div id="user-section" style="display: none;">
            <h2>Vítejte!</h2>
            <p>Jste přihlášeni jako: <strong id="user-email-display"></strong></p>
            <button id="logout-btn">Odhlásit se</button>
        </div>
    </main>
</div>
</body>
</html>
