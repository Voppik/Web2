<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voppy-Man OS | Upravit</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/745426684c.js" crossorigin="anonymous"></script>
</head>
<body>
<button id="hamburger" class="hamburger-btn"><i class="fa-solid fa-bars"></i></button>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><i class="fa-solid fa-terminal"></i> <span>Voppy-Man OS</span></div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Úvod</a>
            <a href="tabulka.html" class="nav-link active"><i class="fa-solid fa-table"></i> Slovník Pojmů</a>
        </nav>
    </aside>

    <main class="main-content">
        <header><h1>Upravit pojem</h1></header>
        <div class="form-wrapper">
            <form id="edit-form">
                <input type="hidden" id="record-id">
                <div class="form-group"><label>Pojem:</label><input type="text" id="term" required></div>
                <div class="form-group"><label>Kategorie:</label><input type="text" id="category" required></div>
                <div class="form-group"><label>Vysvětlení:</label><textarea id="explanation" rows="4" required></textarea></div>
                <div class="form-group"><label>Poznámka:</label><textarea id="note" rows="2"></textarea></div>
                <div class="form-group"><label>Autor:</label><textarea id="autor" rows="2"></textarea></div>

                <button type="submit" class="btn btn-warning btn-auto"><i class="fa-solid fa-pen"></i> Přepsat</button>
                <button type="button" class="btn btn-danger btn-auto" onclick="window.location.href='tabulka.html'">Zrušit</button>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="index.js"></script>
<script src="upravit.js"></script>
</body>
</html>
